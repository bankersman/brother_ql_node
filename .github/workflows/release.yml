name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Docs build
        run: pnpm docs:build

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm publish -r --access public --dry-run --no-git-checks

      - name: Assert version matches tag
        if: github.event_name == 'push'
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: pnpm assert-release-version

      - name: Publish to npm
        if: github.event_name == 'push'
        run: pnpm publish -r --access public --provenance --no-git-checks
